<h2 class="sr-only">Graphique en barres montrant l'évolution du nombre de stratégies Intune : 60 avant refonte, 20 juste après la refonte, 40 aujourd'hui</h2>
<div style="position: relative; width: 100%; height: 280px;">
<canvas id="stratChart" role="img" aria-label="Nombre de stratégies Intune : 60 avant refonte, 20 juste après refonte, 40 aujourd'hui">Avant refonte 60, juste après refonte 20, aujourd'hui 40.</canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
new Chart(document.getElementById('stratChart'), {
  type: 'bar',
  data: {
    labels: ['Avant refonte', 'Juste après refonte', 'Aujourd\'hui'],
    datasets: [{
      label: 'Nombre de stratégies',
      data: [60, 20, 40],
      backgroundColor: '#2a78d6',
      borderRadius: 4,
      maxBarThickness: 60
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      y: { beginAtZero: true, grid: { color: '#e1e0d9' }, ticks: { color: '#898781' } },
      x: { grid: { display: false }, ticks: { color: '#898781' } }
    }
  }
});
</script>
